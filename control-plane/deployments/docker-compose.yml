version: "3.9"

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  grid:
    driver: bridge

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

# ── Services ──────────────────────────────────────────────────────────────────
services:

  # ── PostgreSQL 16 ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     grid
      POSTGRES_PASSWORD: gridpass
      POSTGRES_DB:       griddb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    networks:
      - grid
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grid -d griddb"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 10s

  # ── Redis 7.2 ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    command: >
      redis-server
        --appendonly yes
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - grid
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── Control-plane server ─────────────────────────────────────────────────────
  server:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      GRID_SERVER_HOST:                  "0.0.0.0"
      GRID_SERVER_PORT:                  "8080"
      GRID_SERVER_READ_TIMEOUT_SEC:      "30"
      GRID_SERVER_WRITE_TIMEOUT_SEC:     "60"
      GRID_DATABASE_DSN:                 "postgres://grid:gridpass@postgres:5432/griddb?sslmode=disable"
      GRID_DATABASE_MAX_OPEN_CONNS:      "20"
      GRID_DATABASE_MAX_IDLE_CONNS:      "5"
      GRID_DATABASE_CONN_TIMEOUT_SEC:    "10"
      GRID_REDIS_ADDR:                   "redis:6379"
      GRID_REDIS_PASSWORD:               ""
      GRID_REDIS_DB:                     "0"
      GRID_SECURITY_HMAC_SECRET:         "change-me-in-production-use-a-long-random-string"
      GRID_SECURITY_ARGON_MEMORY:        "65536"
      GRID_SECURITY_ARGON_ITERATIONS:    "3"
      GRID_SECURITY_ARGON_PARALLELISM:   "2"
      GRID_SECURITY_ARGON_SALT_LEN:      "16"
      GRID_SECURITY_ARGON_KEY_LEN:       "32"
      GRID_SCHEDULER_TICK_INTERVAL_SEC:  "5"
      GRID_SCHEDULER_REAPER_INTERVAL_SEC: "30"
      GRID_SCHEDULER_HEARTBEAT_TTL_SEC:  "90"
      GRID_DASHBOARD_SNAPSHOT_CACHE_TTL_SEC: "10"
      GRID_DASHBOARD_MAX_SSE_CLIENTS:    "500"
      GRID_LOGGING_LEVEL:                "info"
      GRID_LOGGING_FORMAT:               "json"
    ports:
      - "8080:8080"
    networks:
      - grid
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 15s
      timeout:  5s
      retries:  3
      start_period: 20s

  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    networks:
      - grid
    depends_on:
      - server

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_USER:     admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP:     "false"
      GF_SERVER_ROOT_URL:         "http://localhost:3000"
    ports:
      - "3000:3000"
    networks:
      - grid
    depends_on:
      - prometheus
