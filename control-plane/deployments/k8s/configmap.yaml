apiVersion: v1
kind: ConfigMap
metadata:
  name: control-plane-config
  namespace: grid-computing
data:
  GRID_SERVER_HOST: "0.0.0.0"
  GRID_SERVER_PORT: "8080"
  GRID_DATABASE_MAX_OPEN_CONNS: "25"
  GRID_DATABASE_MAX_IDLE_CONNS: "5"
  GRID_DATABASE_CONN_TIMEOUT_SEC: "10"
  GRID_SCHEDULER_TICK_INTERVAL_SEC: "5"
  GRID_SCHEDULER_REAPER_INTERVAL_SEC: "30"
  GRID_SCHEDULER_HEARTBEAT_TTL_SEC: "90"
  GRID_DASHBOARD_SNAPSHOT_CACHE_TTL_SEC: "30"
  GRID_DASHBOARD_MAX_SSE_CLIENTS: "1000"
  GRID_LOGGING_LEVEL: "info"
  GRID_LOGGING_FORMAT: "json"
---
apiVersion: v1
kind: Secret
metadata:
  name: control-plane-secrets
  namespace: grid-computing
type: Opaque
stringData:
  # Override these in your GitOps/Helm values
  GRID_DATABASE_DSN: "postgres://grid:CHANGE_ME@postgres:5432/griddb?sslmode=require"
  GRID_REDIS_ADDR: "redis:6379"
  GRID_REDIS_PASSWORD: ""
  GRID_SECURITY_HMAC_SECRET: "CHANGE_ME_32_BYTES_MINIMUM_SECRET"
