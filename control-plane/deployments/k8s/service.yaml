apiVersion: v1
kind: Service
metadata:
  name: control-plane
  namespace: grid-computing
  labels:
    app: control-plane
    app.kubernetes.io/name:      control-plane
    app.kubernetes.io/component: server
  annotations:
    # Prometheus service discovery
    prometheus.io/scrape: "true"
    prometheus.io/port:   "8080"
    prometheus.io/path:   "/metrics"
spec:
  type: ClusterIP
  selector:
    app: control-plane
  ports:
    - name:       http
      protocol:   TCP
      port:       8080
      targetPort: http
